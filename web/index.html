<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="SmartFitao AI – 3D marketplace for traditional wear.">
  <!-- Let Edge/Chrome use webcam inside Flutter Web + embedded pose iframe (port 5000) -->
  <meta http-equiv="Permissions-Policy" content="camera=(self http://127.0.0.1:5000 http://localhost:5000), microphone=(self)">

  <!-- Mobile-first viewport: scale 1:1, no user zoom-out, fits device width -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

  <!-- Theme for mobile browser UI (address bar, status bar) -->
  <meta name="theme-color" content="#059669">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SmartFitao AI">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>SmartFitao AI</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://pub-f822ccb86a5c48d6817764a7e50f2c48.r2.dev" crossorigin>
  <link rel="dns-prefetch" href="https://pub-f822ccb86a5c48d6817764a7e50f2c48.r2.dev">
  <link rel="preconnect" href="https://fyp-backend-hi10.onrender.com">
  <link rel="preconnect" href="https://fyp-web-code-deployment-flea.vercel.app">
  <!-- Required for 3D model-viewer on web -->
  <script type="module" src="https://unpkg.com/@google/model-viewer@3.4.0/dist/model-viewer.min.js"></script>
</head>
<body>
  <noscript>SmartFitao requires JavaScript. Enable it and reload.</noscript>
  <div id="load-fallback" style="font-family:Segoe UI,sans-serif;padding:24px;color:#115E59;">
    Loading SmartFitao…
  </div>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('load-fallback');
      if (el) el.remove();
    });
  </script>
</body>
</html>
